name: AskFlows - Deploy

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: askflow-webapp

jobs:
  build:
    name: Build & package
    if: startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npx quasar build
        env:
          VUE_APP_API: ${{ secrets.VUE_APP_API }}

      - uses: actions/upload-artifact@v4
        with:
          name: app
          path: dist/spa

  approval:
    name: Await approval
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Approved
        run: echo "Deployment approved by ${{ github.actor }}"

  deploy:
    name: Deploy to production
    needs: approval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app
          path: app

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_RIVER_096A9DF0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app
          api_location: ""
          output_location: ""
